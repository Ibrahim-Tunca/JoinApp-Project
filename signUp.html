<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
    <link rel="shortcut icon" href="./img/Capa 2.svg" type="image/x-icon">
    
    <link rel="stylesheet" href="./style/login-signup-style/index.css">
    <link rel="stylesheet" href="./style/login-signup-style/signUp.css">
    <link rel="stylesheet" href="./style/login-signup-style/inputfieldSignUp.css">
    <link rel="stylesheet" href="./style/responsiveness/signUp-responsive.css">

    <script src="./script/signUp.js"></script>
    <script src="./script/contacts-special-functioins/dataBaseFunctions.js"></script>

</head>
<body onload="onloadFunc()">

    <div class="background-cloud-maker" id="blackgroundcloudID"></div>
    <div class="signup-popup" id="popupSignupID">You Signed Up successfully</div>

    <section>
        <img class="join-logo-signup" src="./img/Capa 1.svg" alt="">
    </section>

    <formular class="center-formular-signup">

            <section class="formlar-size-signup background-color-white-signup">

                        <div class="arrow-container-signup">
                            <a href="./index.html">
                                <img class="arrow-signup" src="./img/arrow.svg" alt="arrow.svg">
                            </a>
                        </div>

                        <div class="headline-signup">
                            <h2 class="h2-signup">
                                Sign Up
                            </h2>
                        </div>

                        <div class="form-container-signup">
                            <form name="signUpForm"  class="form-section-signup">

                                <div class="inputfield-container-login" id="inputfieldPasswordContainerID">
                                    <input class="inputfield-name-signup inputfield-font-signup" type="text" placeholder="Name" name="name" id="nameID">
                                    <img class="input-icons-signup" src="./img/register/person.svg">
                                </div>
                                <div class="error-message-signup" id="errorMessageNameID"></div>

                                <div class="inputfield-container-login" id="inputfieldPasswordContainerID">
                                    <input class="inputfield-mail-signup inputfield-font-signup" type="email" placeholder="Email" name="mail" id="mailID" autocomplete="email">
                                    <img class="input-icons-signup" src="./img/register/mail.svg">
                                </div>
                                <div class="error-message-signup" id="errorMessageMailID"></div>

                                <div class="inputfield-container-login" id="inputfieldPasswordContainerID">
                                    <input onkeyup="iconSwitch()" class="inputfield-password-signup inputfield-font-signup" type="password" placeholder="Password" name="password" id="passwordID" autocomplete="new-password">
                                    <img onclick="showAndHidePassword()" class="input-icons-signup" src="./img/register/lock.svg" id="lockIconID">
                                </div>
                                <div class="error-message-signup" id="errorMessagePasswordID"></div>

                                <div class="inputfield-container-login" id="inputfieldPasswordContainerID">
                                    <input class="inputfield-repeat-signup inputfield-font-signup" type="password" placeholder="Confirm Password" name="repeat" id="repeatID" autocomplete="new-password">
                                    <img onclick="showAndHidePassword()" class="input-icons-signup" src="./img/register/lock.svg" id="repeatlockIconID">
                                </div>
                                <div class="error-message-signup" id="errorMessageRepeatID"></div>

                                <div class="checkbox-signup-container">  
                                    <span onclick="toggleThePrivacyCheckbox()" class="checkbox-box" id="acceptPolicyID"></span>
                                    <span>i accept the <a class="checkbox-href" href="">Privacy policy</a></span>
                                </div>
                                <div class="error-message-signup" id="errorMessageCheckboxID"></div>

                                <div class="button-container-signup">
                                    <div class="button-order-signup">
                                        <button onclick="return validateForm(event)" class="blue-button-big blue-button-settings-signup">Sign Up</button>  
                                    </div> 
                                </div> 
                            </form>

            </section>

    </formular>

    <bottom-section>
        <div class="bottom-section-order">
            <a class="private-pollicy-legal-notice-element" href="./privacy-unlogged.html">Privacy Policy</a>
            <a class="private-pollicy-legal-notice-element" href="./legal-unlogged.html">Legal Notice</a>
        </div>
    </bottom-section>


</body>
</html>
