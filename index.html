<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="shortcut icon" href="./img/Capa 2.svg" type="image/x-icon">
    <link rel="stylesheet" href="./style/login-signup-style/index.css">
    <link rel="stylesheet" href="./style/responsiveness/index-responsive.css">

    <script src="script/index.js"></script>

</head>
<body onload="onloadFunc()">

    <img class="blue-join-icon-login" src="./img/Capa 2.svg">

    <top-section class="top-section">
                
            <div class="not-a-join-user">
                <div>
                    not a join user? 
                </div>
                <a href="./signUp.html">
                    <button class="blue-button">Sign up</button>
                </a>
            </div>
    </top-section>



    <section class="center-section-login">
    
        <div class="center-container-login">
            <div class="headline-login">
                <h2 class="h2-login">
                    Log in
                </h2>
            </div>

            <div class="form-container-login">
                <form name="loginForm">
                    <div class="inputfields-container-login">
                        <div  class="inputfield-container-login">
                            <input class="inputfield-mail-login" type="email" name="mail" autocomplete="email" placeholder="Email" id="emailID">
                            <img class="input-icons-login" src="./img/register/mail.svg">
                        </div>

                        <div class="inputfield-container-login" id="inputfieldPasswordContainerID">
                            <input onkeyup="iconSwitch()" class="inputfield-password-login" type="password" name="password" autocomplete="Password" placeholder="Password" id="passwordID">
                            <img onclick="showAndHidePassword()" class="input-icons-login" src="./img/register/lock.svg" id="lockIconID">
                        </div>
                    </div>   
                    <div class="error-class-login" id="errorID"></div> 
                <div class="button-container-login">
                <div class="button-order-login">
                    <button  onclick="return validateForm(event)" class="blue-button-big">Log in</button>
                    <button type="button" class="white-button-big" onclick="window.location.href='./summary.html'">
                        Guest Log in
                    </button>
                </div>
            </div>
                
                
                
                
                
                </form>
            </div>

            
        </div>  

    </section>



    <bottom-section>
        <div class="bottom-section-order">
            <a class="private-pollicy-legal-notice-element" href="./privacy-unlogged.html">Privacy Policy</a>
            <a class="private-pollicy-legal-notice-element" href="./legal-unlogged.html">Legal Notice</a>
        </div>
    </bottom-section>


</body>
</html>
