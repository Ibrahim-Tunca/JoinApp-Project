<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="./style/login.css">
</head>
<body>

    <top-section class="top-section">
            <div>
                not a join user? 
            </div>
            <button class="blue-button">
                Sign up
            </button>
    </top-section>

    <section class="center-section">

        <div class="headline-login">
            <h2 class="h2-login">
                Log in
            </h2>
        </div>

        <div class="form-container-login">
            <form class="form-section-login">
                <input class="inputfield-login" type="email" placeholder="Email">
                <input class="inputfield-login" type="password" placeholder="Password">
            </form>
        </div>

        <div class="button-container-login">
            <div class="button-order-login">
                <button class="blue-button-big">Log in</button>   
                <button class="white-button-big">Guest Log in</button>
            </div>
        </div>

    </section>

    <bottom-section>
        <div class="bottom-section-order">
            <a class="private-pollicy-legal-notice-element" href="">Privacy Policy</a>
            <a class="private-pollicy-legal-notice-element" href="">Legal Notice</a>
        </div>
    </bottom-section>


</body>
</html>
