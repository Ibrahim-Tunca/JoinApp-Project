<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style/addContact.css">

</head>
<body>

    <addContact class="addcontact-maincontainer">

        <top-section class="top-section-contact">

            <div class="close-button-container-add-contact"><img class="close-button" src="./img/close.svg" alt=""></div>


            <div class="top-section-inside-container">
                <div class="join-logo-contact-container"><img class="join-logo-contact" src="./img/Capa 1.svg" alt=""></div>
                <h2 class="h2-font-contact">Add Task</h2>
                <span class="top-section-contact-font">Tasks are better with a team!</span>
            </div>


        </top-section>

        <bottom-section class="bottom-section-contact">

            <div class="bottom-section-container-contact">

                <div class="person-logo-container-contact">
                    <img class="person-logo-contact" src="./img/person.svg" alt="">
                </div>

                <div class="input-container-contact">

                    <div class="single-inputfield-container-contact">
                        <input class="inputfield-contact" type="text" placeholder="Name">
                        <img class="inputfield-placeholder-img" src="./img/person.svg" alt="">
                    </div>
                    <div class="single-inputfield-container-contact">
                        <input class="inputfield-contact" type="email" placeholder="Email">
                        <img class="inputfield-placeholder-img" src="./img/mail.svg" alt="">
                    </div>
                    <div class="single-inputfield-container-contact">
                        <input class="inputfield-contact" type="tel" placeholder="Phone">
                        <img class="inputfield-placeholder-img" src="./img/call.svg" alt="">
                    </div>

                </div>

                <div class="button-order-contact">

                    <button class="white-button-big">Cancel <img class="white-button-x" src="./img/iconoir_cancel.svg" alt=""></button>

                    <button class="blue-button-big">Create Contact <img class="blue-button-check" src="./img/check.svg" alt=""></button>

                </div>

            </div>

        </bottom-section>



    </addContact>
    
</body>
</html>
