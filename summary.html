<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>summary</title>
    <link rel="shortcut icon" href="./img/Capa 2.svg" type="image/x-icon">

    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/navbar.css">
    <link rel="stylesheet" href="./style/summary.css">
    <link rel="stylesheet" href="./style/summarycards.css">
    <link rel="stylesheet" href="./style/responsiveness/summary-responsive.css">
    <link rel="stylesheet" href="./style/responsiveness/navbar-responsive.css">
    <link rel="stylesheet" href="./style/responsiveness/header-responsive.css">

    <link rel="stylesheet" href="./style/small-styles/headerPopUp.css">

    <script src="./script/popUp.js"></script>
    <script src="./script/userLogin.js"></script>
    <script src="./script/summary.js"></script>

</head>
<body onload="setNameInitialButton(), loadTaskStats(), greetAnimation()">

    <greetingResponsesive class="greeting-responsesive" id="greetingResponsiveContainerID">
        <div id="greetingResponsiveID">

        </div>
    </greetingResponsesive>

    <header>
            <img class="capa-icon-header" src="./img/Capa 1.svg" alt="">
            <div class="header-right-section-container">
                <span class="header-font">Kanban Project Management Tool</span>
                <a href="./help.html"><img  class="help-icon" src="./img/help.svg" alt=""></a>
                <button class="user-button" onclick="togglePopUpMenue(event)" id="userInitialButtonID">G</button>
            </div>
    </header>

    <main-container class="main-container">

        <popupmenue class="popup-menue-position d_none" id="popUpID">
                <div class="popup-menue-container">
                    <a class="popup-menue-font" href="./legal.html">Legal Notice</a>
                    <a class="popup-menue-font" href="./privacy.html">Private Policy</a>
                    <a onclick="logout()" class="popup-menue-font" href="./index.html">Log out</a>
                </div>
        </popupmenue>



        <navbar class="navbar">

            <div class="first-navcontainer">
                <a class="navbar-element navbar-element-selected" href="./summary.html"><img class="navbar-icons" src="./img/Vector.svg"><img class="navbar-icons-responsive" src="./img/vector_blue.svg">Summary</a>
                <a class="navbar-element" href="./addTask.html"><img class="navbar-icons" src="./img/edit_square.svg"><img class="navbar-icons-responsive" src="./img/edit_square.svg">Add Task</a>
                <a class="navbar-element" href="./board.html"><img class="navbar-icons" src="./img/Board.svg"><img class="navbar-icons-responsive" src="./img/Board.svg">Board</a>
                <a class="navbar-element" href="./contacts.html"><img class="navbar-icons" src="./img/perm_contact_calendar.svg"><img class="navbar-icons-responsive" src="./img/perm_contact_calendar.svg">Contacts</a>
            </div>

            <div class="second-navcontainer">
                <a class="navbar-element-bottom" href="./privacy.html">Privacy Policy</a>
                <a class="navbar-element-bottom" href="./legal.html">Legal Notice</a>
            </div>

        </navbar>


        <maincontent class="maincontent-outside-container-summary">

            

            <div class="maincontent-inside-container-summary">
                <div class="headline-container-summary" id="greetingID">

                </div>
                
                <div class="up-and-down-container">
                    <div class="upper-container ">


                        <a href="./board.html" class="urgency-container border-radius-summary border-color-summary transition-quick">
                                <div>
                                    <div class="other-icon-and-number">
                                        <img class="img-size-border transition-quick" src="./img/summary-urgent.svg">
                                        <span class="urgency-number" id="urgentTasksNumberID">1</span>
                                    </div>
                                    <span class="urgency-font transition-quick">Tasks Urgent</span>
                                </div>
                                <separator class="urgency-separator transition-quick"></separator>
                                <div class="urgency-inside-right-container transition-quick">
                                    <div class="urgency-inside-right-top-container">
                                        <span class="urgency-font-bold transition-quick" id="monthID"></span>
                                        <span class="urgency-font-bold transition-quick" id="dayID"></span>
                                        <span class="urgency-font-bold transition-quick" id="yearID"></span>
                                    </div>
                                    <span class="urgency-font transition-quick">Upcoming Deadline</span>
                                </div>
                        </a>


                        <a href="./board.html" class="tasks-on-board-container border-radius-summary border-color-summary transition-quick">
                            <div class="tasks-on-board-inside-container">
                                    <div class="other-icon-and-number">
                                        <img class="img-size-border transition-quick" src="./img/summary-board.svg" alt="">
                                        <span class="number-size transition-quick" id="tasksBoardNumberID">5</span>
                                    </div>
                                    <span class="regular-container-font transition-quick">Tasks in Board</span>
                            </div>
                        </a>


                    </div>




                    <div class="lower-container">


                        <a href="./board.html" class="tasks-to-do-container border-radius-summary border-color-summary transition-quick">
                            <div class="tasks-to-do-inside-container">
                                    <div class="other-icon-and-number">
                                        <img class="img-size-border transition-quick" src="./img/summary-todo.svg" alt="">
                                        <span class="number-size transition-quick" id="tasksTodoNumberID">5</span>
                                    </div>
                                    <span class="regular-container-font transition-quick">Tasks To-do</span>
                            </div>
                        </a>


                        <a href="./board.html" class="other-container border-radius-summary border-color-summary transition-quick">
                            <div class="other-inside-container">
                                    <div class="other-icon-and-number">
                                        <img class="img-size-border transition-quick" src="./img/summary-progress.svg" alt="">
                                        <span class="number-size transition-quick" id="tasksInProgressNumberID">5</span>
                                    </div>
                                    <span class="regular-container-font transition-quick">Tasks in Progress</span>
                            </div>
                        </a>


                        <a href="./board.html" class="other-container border-radius-summary border-color-summary transition-quick">
                            <div class="other-inside-container">
                                    <div class="other-icon-and-number">
                                        <img class="img-size-border transition-quick" src="./img/summary-feedback.svg" alt="">
                                        <span class="number-size transition-quick" id="tasksAwaitingFeedbackNumberID">5</span>
                                    </div>
                                    <span class="regular-container-font">Awaiting Feedback</span>
                            </div>
                        </a>


                        <a href="./board.html" class="other-container border-radius-summary border-color-summary transition-quick">
                            <div class="other-inside-container">
                                    <div class="other-icon-and-number">
                                        <img class="img-size-border transition-quick" src="./img/summary-done.svg" alt="">
                                        <span class="number-size transition-quick" id="tasksDoneNumberID">5</span>
                                    </div>
                                    <span class="regular-container-font">Tasks done</span>
                            </div>
                        </a>


                    </div>
                </div>
            </div>

        </maincontent>

    </main-container>
    
</body>
</html>
