<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style/userstory.css">

</head>
<body>

    <maincontainer class="main-container-userstory">

        <div style="display: flex; justify-content: space-between;">
            <span class="userstory-category-tag">User Story</span>
            <img class="close-button-userstory" src="./img/close-blue.svg" alt="">
        </div>

        <h1 class="h1-font-userstory">Kochwelt Page & Recipe Recommander</h1>

        <span class="regular-span-font-userstory">Build start page with recipe recommendation.</span>

        <date style=" display: flex;">
            <span class="bold-span-font-userstory bold-span-font-space-userstory">Due Date:</span>
            <span class="regular-span-font-userstory">29.02.1988</span>
        </date>

        <priotity style=" display: flex;">
            <span class="bold-span-font-userstory bold-span-font-space-userstory">Priority:</span>
            <span class="regular-span-font-userstory">Medium <img class="priotity-icon-userstory" src="./img/userstory/prio-medium.svg" alt=""></span>
        </priotity>

        <assignedTo style="display: flex; flex-direction: column;">
            <span class="bold-span-font-userstory bold-span-font-space-userstory">Assigned To:</span>
            <div class="assigned-to-content-order">
                <div class="letter-ball-userstory">EM</div>
                <span class="regular-span-font-userstory">Emanuel Mauer</span>
            </div>
        </assignedTo>

        <subtasks>
            <span class="bold-span-font-userstory bold-span-font-space-userstory">Subtaks:</span>
            <div class="subtasks-single-container-userstory">
                <input class="subtasks-inputfield-userstory" type="checkbox" name="implement" id="">
                <span class="regular-span-font-userstory">Implement Recipe recommendation</span>
            </div>
            <div class="subtasks-single-container-userstory">
                <input class="subtasks-inputfield-userstory" type="checkbox" name="start" id="">
                <span class="regular-span-font-userstory">Start Page Layout</span>
            </div>
        </subtasks>

        <edit-delete class="edit-delete-container-userstory">
            <div class="edit-delete-single-container-userstory">
                <img class="edit-delete-icon-userstory" src="./img/userstory/delete.svg" alt="">
                <span class="edit-delete-font-userstory">Delete</span>
            </div>
            <separator class="edit-delete-separator-userstory"></separator>
            <div class="edit-delete-single-container-userstory">
                <img class="edit-delete-icon-userstory" src="./img/userstory/edit.svg" alt="">
                <span class="edit-delete-font-userstory">Edit</span>
            </div>

        </edit-delete>
        
    </maincontainer>
    
</body>
</html>
