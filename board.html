<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>summary</title>
    <link rel="shortcut icon" href="./img/Capa 2.svg" type="image/x-icon">

    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/navbar.css">
    <link rel="stylesheet" href="./style/board.css">
    <link rel="stylesheet" href="./style/board-styles/board-cards.css">
    <link rel="stylesheet" href="./style/board-styles/cardDetails.css">
    <link rel="stylesheet" href="./style/board-styles/cardDetails-Edit.css">
    

    <link rel="stylesheet" href="./style/addTasks.css">
    <link rel="stylesheet" href="./style/addTask-sidebuttons.css">
    <link rel="stylesheet" href="./style/add-task-styles/addTask-Error-Message.css">
    <link rel="stylesheet" href="./style/small-styles/contactColorID.css">

    <link rel="stylesheet" href="./style/board-styles/addTaskWindow.css">

    <link rel="stylesheet" href="./style/small-styles/headerPopUp.css">

    <script src="./script/popUp.js"></script>
    <script src="./script/board.js"></script>
    <script src="./script/board-special-functions/cardDetail.js"></script>
    <script src="./script/board-special-functions/drag-and-drop-functions.js"></script>
    <script src="./script/board-special-functions/board-dataBase-functions.js"></script>
    <script src="./script/board-special-functions/board-template-functions.js"></script>
    <script src="./script/board-special-functions/sortCardsInCorrectContainer.js"></script>
    <script src="./script/board-special-functions/board-cardDetail-editwindow.js"></script>

    <script defer src="./script/addTask.js"></script>
    <script src="./script/addTask-special-functions/inputAndSelectFields.js"></script>
    <script src="./script/addTask-special-functions/addTask-templates.js"></script>
    <script src="./script/addTask-special-functions/addTask-DataBaseFunctions.js"></script>


</head>
<body onload="renderAllCards()">

    <div onclick="hideAddTaskWindow(), hideCardDetailWindow()" class="white-transparent-overlay" id="whiteTransparentOverlayID"></div>
    <div class="succesfull-popup" id="popUpSuccesID">Task added to board <img class="board-icon-add-task" src="./img/addTask/Board_white.svg"></div>


    <header>
            <img class="capa-icon-header" src="./img/Capa 1.svg" alt="">
            <div class="header-right-section-container">
                <span class="header-font">Kanban Project Management Tool</span>
                <a href="./help.html"><img  class="help-icon" src="./img/help.svg" alt=""></a>
                <button class="user-button" onclick="togglePopUpMenue()">G</button>
            </div>
    </header>

    <main-container style="display: flex; overflow: hidden;">

        <popupmenue class="popup-menue-position d_none" id="popUpID">
                <div class="popup-menue-container">
                    <a class="popup-menue-font" href="./legal.html">Legal Notice</a>
                    <a class="popup-menue-font" href="./privacy.html">Private Policy</a>
                    <a class="popup-menue-font" href="./index.html">Log out</a>
                </div>
        </popupmenue>

        <navbar class="navbar">

            <div class="first-navcontainer">
                <a class="navbar-element" href="./summary.html"><img class="navbar-icons" src="./img/Vector.svg" alt="">Summary</a>
                <a class="navbar-element" href="./addTask.html"><img class="navbar-icons" src="./img/edit_square.svg" alt="">Add Task</a>
                <a class="navbar-element navbar-element-selected" href="./board.html"><img class="navbar-icons" src="./img/Board.svg" alt="">Board</a>
                <a class="navbar-element" href="./contacts.html"><img class="navbar-icons" src="./img/perm_contact_calendar.svg" alt="">Contacts</a>
            </div>

            <div class="second-navcontainer">
                <a class="navbar-element-bottom" href="./privacy.html">Privacy Policy</a>
                <a class="navbar-element-bottom" href="./legal.html">Legal Notice</a>
            </div>

        </navbar>

        <maincontent class="maincontent-container-board">

            <section class="input-addtask-button-container">
                <div class="inputfield-container-board">
                    <input class="inputfield-board" type="text" name="search" id="" placeholder="Find Task">
                    <img class="search-icon-board" src="./img/search.svg" alt="">
                </div>
                <button onclick="showAddTaskWindow()" class="blue-button-borad">
                    Add Task
                    <img class="plus-icon-board" src="./img/plus.svg" alt="">
                </button>
            </section>

            <section class="bottom-section-board">

                <div class="bottom-section-single-container-board">

                    <div class="headline-container-board">
                        <h2 class="h2-font-board">To do</h2>
                        <div class="plus-button-board">
                            +
                        </div>
                    </div>

                    <div class="cards-container-board" id="toDoContainerID" ondrop="moveTo('toDoContainerID')" onmouseleave="removeContainerDragHover('toDoContainerID')" ondragleave="removeContainerDragHover('toDoContainerID')" ondragover="allowDrop(event), getContainerDragHover('toDoContainerID')">
                        
                    </div>

                </div>


                <div class="bottom-section-single-container-board">

                    <div class="headline-container-board">
                        <h2 class="h2-font-board">In progress</h2>
                        <div class="plus-button-board">
                            +
                        </div>
                    </div>

                    <div class="cards-container-board" id="inProgressContainerID" ondrop="moveTo('inProgressContainerID')" onmouseleave="removeContainerDragHover('inProgressContainerID')" ondragleave="removeContainerDragHover('inProgressContainerID')" ondragover="allowDrop(event), getContainerDragHover('inProgressContainerID')">
                        
                    </div>

                </div>



                <div class="bottom-section-single-container-board">

                    <div class="headline-container-board">
                        <h2 class="h2-font-board">Await feedback</h2>
                        <div class="plus-button-board">
                            +
                        </div>
                    </div>

                    <div class="cards-container-board" id="awaitFeedbackContainerID" ondrop="moveTo('awaitFeedbackContainerID')" onmouseleave="removeContainerDragHover('awaitFeedbackContainerID')" ondragleave="removeContainerDragHover('awaitFeedbackContainerID')" ondragover="allowDrop(event), getContainerDragHover('awaitFeedbackContainerID')">
                        
                    </div>

                </div>

        
                <div class="bottom-section-single-container-board">

                        <div class="headline-container-board">
                            <h2 class="h2-font-board">Done</h2>
                            <div class="plus-button-board">
                                +
                            </div>
                        </div>

                        <div class="cards-container-board" id="doneContainerID" ondrop="moveTo('doneContainerID')" onmouseleave="removeContainerDragHover('doneContainerID')" ondragleave="removeContainerDragHover('doneContainerID')" ondragover="allowDrop(event), getContainerDragHover('doneContainerID')">
                        
                        </div>

                    </div>

                


            </section>


        <section id="formContainerID">

                    
            
        </section>
 

        </maincontent>

    </main-container>
    
</body>
</html>
