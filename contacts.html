<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>summary</title>
    <link rel="shortcut icon" href="./img/Capa 2.svg" type="image/x-icon">

    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/navbar.css">
    <link rel="stylesheet" href="./style/contacts.css">
    <link rel="stylesheet" href="./style/addContact.css">
    <link rel="stylesheet" href="./style/small-styles/contactColorID.css">
    <link rel="stylesheet" href="./style/floatingContact.css">

    <link rel="stylesheet" href="./style/small-styles/headerPopUp.css">

    <script src="./script/popUp.js"></script>
    <script src="./script/contact.js"></script>
    <script src="./script/contacts-special-functioins/contactTemplates.js"></script>
    <script src="./script/contacts-special-functioins/contactSpecialFunctions.js"></script>

</head>
<body onload="onloadFunc()">

    <div onclick="toggleAddContactWindow()" class="overlay-contacts" id="overlayID"></div>

    <header>
            <img class="capa-icon-header" src="./img/Capa 1.svg" alt="">
            <div class="header-right-section-container">
                <span class="header-font">Kanban Project Management Tool</span>
                <a href="./help.html"><img  class="help-icon" src="./img/help.svg" alt=""></a>
                <button class="user-button" onclick="togglePopUpMenue()">G</button>
            </div>
    </header>

    <main-container style="display: flex;">

        <popupmenue class="popup-menue-position d_none" id="popUpID">
                <div class="popup-menue-container">
                    <a class="popup-menue-font" href="./legal.html">Legal Notice</a>
                    <a class="popup-menue-font" href="./privacy.html">Private Policy</a>
                    <a class="popup-menue-font" href="./index.html">Log out</a>
                </div>
        </popupmenue>


        <navbar class="navbar">

            <div class="first-navcontainer">
                <a class="navbar-element" href="./summary.html"><img class="navbar-icons" src="./img/Vector.svg" alt="">Summary</a>
                <a class="navbar-element" href="./addTask.html"><img class="navbar-icons" src="./img/edit_square.svg" alt="">Add Task</a>
                <a class="navbar-element" href="./board.html"><img class="navbar-icons" src="./img/Board.svg" alt="">Board</a>
                <a class="navbar-element" href="./contacts.html"><img class="navbar-icons" src="./img/perm_contact_calendar.svg" alt="">Contacts</a>
            </div>

            <div class="second-navcontainer">
                <a class="navbar-element" href="./privacy.html">Privacy Policy</a>
                <a class="navbar-element" href="./legal.html">Legal Notice</a>
            </div>

        </navbar>

        <maincontent class="maincontent-container-contacts">









    <addContact class="addcontact-maincontainer toggle-add-contact-card" id="addContactID">

        <top-section class="top-section-contact">

            <div onclick="toggleAddContactWindow()" class="close-button-container-add-contact"><img class="close-button" src="./img/close.svg" alt=""></div>


            <div class="top-section-inside-container">
                <div class="join-logo-contact-container"><img class="join-logo-contact" src="./img/Capa 1.svg" alt=""></div>
                <h2 class="h2-font-contact">Add Task</h2>
                <span class="top-section-contact-font">Tasks are better with a team!</span>
            </div>


        </top-section>

        <contact class="bottom-section-contact">

            <form name="addContactForm" class="bottom-section-container-contact">

                <div class="person-logo-container-contact">
                    <img class="person-logo-contact" src="./img/person.svg" alt="">
                </div>

                <div class="input-container-contact">

                    <div class="single-inputfield-container-contact">
                        <input class="inputfield-contact" type="text" placeholder="Name" name="name" id="nameID">
                        <img class="inputfield-placeholder-img" src="./img/person.svg" alt="">
                    </div>
                    <div class="single-inputfield-container-contact">
                        <input class="inputfield-contact" type="email" placeholder="Email" name="mail" id="mailID">
                        <img class="inputfield-placeholder-img" src="./img/mail.svg" alt="">
                    </div>
                    <div class="single-inputfield-container-contact">
                        <input class="inputfield-contact" type="tel" placeholder="Phone" name="phone" id="phoneID">
                        <img class="inputfield-placeholder-img" src="./img/call.svg" alt="">
                    </div>

                </div>

                <div class="button-order-contact">

                    <button onclick="toggleAddContactWindow()" class="white-button-big">Cancel <img class="white-button-x" src="./img/iconoir_cancel.svg" alt=""></button>

                    <button onclick="return validateAddContactForm(event)" class="blue-button-big">Create Contact <img class="blue-button-check" src="./img/check.svg" alt=""></button>

                </div>

            </form>

        </contact>



    </addContact>

                

















                <contact-section class="allcontacts-container">

                            <div class="button-background-white">
                                <button onclick="toggleAddContactWindow()" class="contacts-button" id="contactsButtonID">Add new contact <img class="person-add-img" src="./img/contacts/person_add.svg" alt=""></button>
                            </div>

                            <div class="contact-container-space-between-button-and-contacts">

                            </div>

                            <contact id="contactID"></contact>
        

                </contact-section>

                


        </maincontent>

        <div id="contactDetailsID"></div>

    </main-container>
    
</body>
</html>
