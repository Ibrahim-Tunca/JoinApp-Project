<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>summary</title>
    <link rel="shortcut icon" href="./img/Capa 2.svg" type="image/x-icon">

    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/navbar.css">
    <link rel="stylesheet" href="./style/contacts.css">
    <link rel="stylesheet" href="./style/addContact.css">
    <link rel="stylesheet" href="./style/editContact.css">
    <link rel="stylesheet" href="./style/small-styles/contactColorID.css">
    <link rel="stylesheet" href="./style/small-styles/floatingContact.css">
    <link rel="stylesheet" href="./style/responsiveness/contacts-responsive.css">

    <link rel="stylesheet" href="./style/small-styles/headerPopUp.css">
    <link rel="stylesheet" href="./style/responsiveness/navbar-responsive.css">
    <link rel="stylesheet" href="./style/responsiveness/header-responsive.css">

    <script src="./script/popUp.js"></script>
    <script src="./script/userLogin.js"></script>

    <script src="./script/contact.js"></script>
    <script src="./script/contacts-special-functioins/dataBaseFunctions.js"></script>
    <script src="./script/contacts-special-functioins/contactTemplates.js"></script>
    <script src="./script/contacts-special-functioins/contactSpecialFunctions.js"></script>
    <script src="./script/contacts-special-functioins/slidingWindows.js"></script>

</head>
<body onload="setNameInitialButton(), onloadFunc()">

    <div onclick="hideAddContactAndEditContactWindow()" class="overlay-contacts" id="overlayID"></div>

    <div class="succesfull-popup" id="popupContactID">Contact successfully created</div>

    <header>
        <div class="header-container">
            <img class="capa-icon-header" src="./img/Capa 1.svg" alt="">
            <div class="header-right-section-container">
                <span class="header-font">Kanban Project Management Tool</span>
                <a href="./help.html"><img  class="help-icon" src="./img/help.svg" alt=""></a>
                <button class="user-button" onclick="togglePopUpMenue(event)" id="userInitialButtonID">G</button>
            </div>
        </div>
    </header>

    <main-container class="maincontainer">

        <popupmenue class="popup-menue-position d_none" id="popUpID">
                <div class="popup-menue-container">
                    <a class="popup-menue-font" href="./legal.html">Legal Notice</a>
                    <a class="popup-menue-font" href="./privacy.html">Private Policy</a>
                    <a onclick="logout()" class="popup-menue-font" href="./index.html">Log out</a>
                </div>
        </popupmenue>


        <navbar class="navbar">

            <div class="first-navcontainer">
                <a class="navbar-element" href="./summary.html"><img class="navbar-icons" src="./img/Vector.svg"><img class="navbar-icons-responsive" src="./img/Vector.svg">Summary</a>
                <a class="navbar-element" href="./addTask.html"><img class="navbar-icons" src="./img/edit_square.svg"><img class="navbar-icons-responsive" src="./img/edit_square.svg">Add Task</a>
                <a class="navbar-element" href="./board.html"><img class="navbar-icons" src="./img/Board.svg"><img class="navbar-icons-responsive" src="./img/Board.svg">Board</a>
                <a class="navbar-element navbar-element-selected" href="./contacts.html"><img class="navbar-icons" src="./img/perm_contact_calendar.svg"><img class="navbar-icons-responsive" src="./img/perm_contact_calender_blue.svg">Contacts</a>
            </div>

            <div class="second-navcontainer">
                <a class="navbar-element-bottom" href="./privacy.html">Privacy Policy</a>
                <a class="navbar-element-bottom" href="./legal.html">Legal Notice</a>
            </div>

        </navbar>

        <realmaincontainer class="real-maincontent-container-contacts">

                        <maincontent class="maincontent-container-contacts">


                        <addContact class="addcontact-maincontainer slide-right-window" id="addContactID">

                        </addContact>



                        <editContact class="editContact-maincontainer slide-left-window" id="editContactID">

                        </editContact>

                                <contact-section class="allcontacts-container">

                                            <div class="button-background-white">
                                                <button onclick="showAddContactWindow()" class="contacts-button" id="contactsButtonID">Add new contact <img class="person-add-img" src="./img/contacts/person_add.svg" id="addPersonIconID"></button>
                                            </div>

                                            <div class="contact-container-space-between-button-and-contacts">

                                            </div>

                                            <contact class="contact-container-responsive" id="contactID"></contact>

                                            <div class="contacts-button-responsive-container">
                                                <button onclick="showAddContactWindow()" class="contacts-button-responsive">
                                                    <img class="contacts-button-responsive-icon" src="./img/contacts/person_add.svg">
                                                </button>
                                            </div>
                        

                                </contact-section>

                        </maincontent>

                        <div class="contact-details-container" id="contactDetailsID"></div>

        </realmaincontainer>

    </main-container>
    
</body>
</html>
