<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>summary</title>
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/navbar.css">
    <link rel="stylesheet" href="./style/addTasks.css">
    <link rel="stylesheet" href="./style/addTask-sidebuttons.css">

</head>
<body>

    <header>
            <img class="capa-icon-header" src="./img/Capa 1.svg" alt="">
            <div class="header-right-section-container">
                <span class="header-font">Kanban Project Management Tool</span>
                <img class="help-icon" src="./img/help.svg" alt="">
                <button class="user-button">G</button>
            </div>
    </header>

    <main-container style="display: flex;">

        <navbar class="navbar">

            <div class="first-navcontainer">
                <a class="navbar-element" href="./summary.html"><img class="navbar-icons" src="./img/Vector.svg" alt="">Summary</a>
                <a class="navbar-element" href="./addTask.html"><img class="navbar-icons" src="./img/edit_square.svg" alt="">Add Task</a>
                <a class="navbar-element" href="./board.html"><img class="navbar-icons" src="./img/Board.svg" alt="">Board</a>
                <a class="navbar-element" href="./contacts.html"><img class="navbar-icons" src="./img/perm_contact_calendar.svg" alt="">Contacts</a>
            </div>

            <div class="second-navcontainer">
                <a class="navbar-element" href="">Privacy Policy</a>
                <a class="navbar-element" href="">Legal Notice</a>
            </div>

        </navbar>

        <scrollcontainer style="overflow: hidden; display: flex;">

            <maincontent class="main-container-addTask">



                        <input class="input-title-addTask" type="text" placeholder="Enter a title">
                        <span>This field is required</span>

                        <div class="margin-top-add-task">
                            <span class="font-bold-add-task">Description</span><span class="font-normal-add-task"> (optional)</span>
                        </div>
                        <textarea class="textarea-description-addtask" name="inputDescription-addTask" id="" placeholder="Enter a Description"></textarea>
                        


                        <div class="margin-top-add-task">
                            <span class="font-bold-add-task">Due date</span>
                        </div>
                        <input class="input-date-addTask" type="date" placeholder="tt/mm/jjjj">
                        <span>This field is required</span>


                        <priority class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Priority</span>
                            <div class="prio-buttons-order-addTask margin-top-add-task">
                                <button class="prio-buttons-addTask high-prio-button-addTask">Urgent<img class="prio-icons-addTask" src="./img/addTask/prio-high.svg"></button>
                                <button class="prio-buttons-addTask mid-prio-button-addTask">Medium<img class="prio-icons-addTask" src="./img/addTask/prio-medium.svg"></button>
                                <button class="prio-buttons-addTask low-prio-button-addTask">Low<img class="prio-icons-addTask" src="./img/addTask/prio-low.svg"></button>
                            </div>
                        </priority>





                        <assignedTo class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Assigned to</span><span class="font-normal-add-task"> (optional)</span>
                        </assignedTo>

                        <select class="select-contacts-addTask styled-select-arrow-add-Task margin-top-add-task" name="contacts" required>
                            <option value="" disabled selected hidden>Select contacts to assign</option>
                            <option value="ahmet">ahmet</option>
                            <option value="bibor">bibor</option>
                            <option value="günther">günther</option>
                        </select>




                        <category class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Category</span>
                        </category>

                        <select class="select-contacts-addTask styled-select-arrow-add-Task margin-top-add-task" name="category" required>
                            <option value="0" disabled selected hidden>Select task category</option>
                            <option value="1">Technical Task</option>
                            <option value="2">User Story</option>
                        </select>

                            


                        <subtask class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Subtask</span><span class="font-normal-add-task"> (optional)</span>
                        </subtask>

                        <input class="input-subtask-addTask margin-top-add-task margin-bottom-add-task" type="text" placeholder="add new subtask">
                    



            </maincontent>

        </scrollcontainer>

        <buttons class="button-order-addtask">

            <button class="button-white-addtask">
                Clear
                <img class="clear-icon-addtask" src="./img/addTask/iconoir_cancel.svg" alt="">
            </button>

            <button class="button-blue-addtask">
                Create Task
                <img class="affirmative-icon-addtask" src="./img/addTask/check.svg" alt="">
            </button>

        </buttons>

    </main-container>
    
</body>
</html>
