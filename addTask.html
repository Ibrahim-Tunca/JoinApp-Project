<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>summary</title>
    <link rel="shortcut icon" href="./img/Capa 2.svg" type="image/x-icon">

    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/navbar.css">
    <link rel="stylesheet" href="./style/addTasks.css">
    <link rel="stylesheet" href="./style/addTask-sidebuttons.css">

    <link rel="stylesheet" href="./style/small-styles/headerPopUp.css">

    <script defer src="./script/popUp.js"></script>
    <script defer src="./script/addTask.js"></script>

</head>
<body>

    <header>
            <img class="capa-icon-header" src="./img/Capa 1.svg" alt="">
            <div class="header-right-section-container">
                <span class="header-font">Kanban Project Management Tool</span>
                <a href="./help.html"><img  class="help-icon" src="./img/help.svg" alt=""></a>
                <button class="user-button" onclick="togglePopUpMenue()">G</button>
            </div>
    </header>

    <main-container style="display: flex;">

        <popupmenue class="popup-menue-position d_none" id="popUpID">
                <div class="popup-menue-container">
                    <a class="popup-menue-font" href="./legal.html">Legal Notice</a>
                    <a class="popup-menue-font" href="./privacy.html">Private Policy</a>
                    <a class="popup-menue-font" href="./index.html">Log out</a>
                </div>
        </popupmenue>


        <navbar class="navbar">

            <div class="first-navcontainer">
                <a class="navbar-element" href="./summary.html"><img class="navbar-icons" src="./img/Vector.svg" alt="">Summary</a>
                <a class="navbar-element navbar-element-selected" href="./addTask.html"><img class="navbar-icons" src="./img/edit_square.svg" alt="">Add Task</a>
                <a class="navbar-element" href="./board.html"><img class="navbar-icons" src="./img/Board.svg" alt="">Board</a>
                <a class="navbar-element" href="./contacts.html"><img class="navbar-icons" src="./img/perm_contact_calendar.svg" alt="">Contacts</a>
            </div>

            <div class="second-navcontainer">
                <a class="navbar-element-bottom" href="./privacy.html">Privacy Policy</a>
                <a class="navbar-element-bottom" href="./legal.html">Legal Notice</a>
            </div>

        </navbar>

        <scrollcontainer style="overflow: hidden; display: flex;">

            <form name="addTaskForm" class="main-container-addTask">



                        <input class="input-title-addTask" type="text" placeholder="Enter a title">
                        <span>This field is required</span>

                        <div class="margin-top-add-task">
                            <span class="font-bold-add-task">Description</span><span class="font-normal-add-task"> (optional)</span>
                        </div>
                        <textarea class="textarea-description-addtask" name="inputDescription-addTask" id="" placeholder="Enter a Description"></textarea>
                        


                        <div class="margin-top-add-task">
                            <span class="font-bold-add-task">Due date</span>
                        </div>
                        <input class="input-date-addTask" type="date" placeholder="tt/mm/jjjj">
                        <span>This field is required</span>


                        <priority class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Priority</span>
                            <div class="prio-buttons-order-addTask margin-top-add-task">
                                <button onclick="setPrioToUrgent()" class="prio-buttons-addTask high-prio-button-addTask" id="urgentPrioID">Urgent<img class="prio-icons-addTask" src="./img/addTask/prio-high.svg" id="urgentPrioIMGID"></button>
                                <button onclick="setPrioToMedium()" class="prio-buttons-addTask mid-prio-button-addTask" id="mediumPrioID">Medium<img class="prio-icons-addTask" src="./img/addTask/prio-medium.svg" id="midPrioIMGID"></button>
                                <button onclick="setPrioToLow()" class="prio-buttons-addTask low-prio-button-addTask" id="lowPrioID">Low<img class="prio-icons-addTask" src="./img/addTask/prio-low.svg" id="lowPrioIMGID"></button>
                            </div>
                        </priority>





                        <assignedTo class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Assigned to</span><span class="font-normal-add-task"> (optional)</span>
                        </assignedTo>



                        <div class="custom-select-addTask margin-top-add-task" data-placeholder="Select contacts to assign">
                            <input type="hidden" name="contacts" value="">
                            
                            <button type="button" class="custom-select-toggle-addTask">
                                <span class="custom-select-label-addTask">Select contacts to assign</span>
                                <span class="custom-select-arrow-wrap-addTask">
                                    <img class="custom-select-arrow-addTask" src="./img/addTask/arrow_drop_down.svg" alt="">
                                </span>
                            </button>

                            <div class="custom-select-menu-addTask d_none">
                                <button type="button" class="custom-select-option-addTask" data-value="ahmet">ahmet</button>
                                <button type="button" class="custom-select-option-addTask" data-value="bibor">bibor</button>
                                <button type="button" class="custom-select-option-addTask" data-value="günther">günther</button>
                            </div>
                        </div>




                        <div class="custom-select-addTask margin-top-add-task" data-placeholder="Select task category">
                            <input type="hidden" name="category" value="">
                            
                            <button type="button" class="custom-select-toggle-addTask">
                                <span class="custom-select-label-addTask">Select task category</span>
                                <span class="custom-select-arrow-wrap-addTask">
                                    <img class="custom-select-arrow-addTask" src="./img/addTask/arrow_drop_down.svg" alt="">
                                </span>
                            </button>

                            <div class="custom-select-menu-addTask d_none">
                                <button type="button" class="custom-select-option-addTask" data-value="1">Technical Task</button>
                                <button type="button" class="custom-select-option-addTask" data-value="2">User Story</button>
                            </div>
                        </div>

                            


                        <subtask class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Subtask</span><span class="font-normal-add-task"> (optional)</span>
                            
                        </subtask>

                        <div class="wrapper-div-container margin-top-add-task margin-bottom-add-task">
                            <input onkeyup="showButtons()" name="subtaskform" class="input-subtask-addTask" type="text" placeholder="add new subtask" id="subtaskValueID">
                            
                            <div class="cancel-and-confirm-container d_none" id="subtasksInputfieldButtonContainerID">
                                    <img onclick="deleteInputValueSubtask()" class="cancel-icon" src="./img/addTask/cancel.svg" alt="">
                                    <span class="cancel-and-confirm-separator"></span>
                                    <img onclick="pasteSubtaskUnderInputfield()" class="confirm-icon" src="./img/addTask/confirm.svg" alt="">
                            </div>
                        </div>

                        <div class="subtasks-container" id="createdSubtasksContainerID"></div>

                        

                    </form>

        </scrollcontainer>

        <buttons class="button-order-addtask">

            <button class="button-white-addtask">
                Clear
                <img class="clear-icon-addtask" src="./img/addTask/iconoir_cancel.svg" alt="">
            </button>

            <button class="button-blue-addtask">
                Create Task
                <img class="affirmative-icon-addtask" src="./img/addTask/check.svg" alt="">
            </button>

        </buttons>

    </main-container>
    
</body>
</html>
