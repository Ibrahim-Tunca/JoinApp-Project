<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>summary</title>
    <link rel="shortcut icon" href="./img/Capa 2.svg" type="image/x-icon">

    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/navbar.css">
    <link rel="stylesheet" href="./style/addTasks.css">
    <link rel="stylesheet" href="./style/addTask-sidebuttons.css">
    <link rel="stylesheet" href="./style/add-task-styles/addTask-Error-Message.css">
    <link rel="stylesheet" href="./style/responsiveness/addTask-responsive.css">
    <link rel="stylesheet" href="./style/responsiveness/navbar-responsive.css">
    <link rel="stylesheet" href="./style/responsiveness/header-responsive.css">
    
    <link rel="stylesheet" href="./style/small-styles/contactColorID.css">
    <link rel="stylesheet" href="./style/small-styles/headerPopUp.css">

    <script defer src="./script/popUp.js"></script>
    <script defer src="./script/addTask.js"></script>
    <script src="./script/userLogin.js"></script>
    <script src="./script/addTask-special-functions/inputAndSelectFields.js"></script>
    <script src="./script/addTask-special-functions/addTask-templates.js"></script>
    <script src="./script/addTask-special-functions/addTask-DataBaseFunctions.js"></script>

</head>
<body onload="setNameInitialButton(), loadContacts()">

    <div  class="white-transparent-overlay" id="whiteTransparentOverlayID"></div>
    <div class="succesfull-popup" id="popUpSuccesID">Task added to board <img class="board-icon-add-task" src="./img/addTask/Board_white.svg"></div>

    <header>
            <img class="capa-icon-header" src="./img/Capa 1.svg" alt="">
            <div class="header-right-section-container">
                <span class="header-font">Kanban Project Management Tool</span>
                <a href="./help.html"><img  class="help-icon" src="./img/help.svg" alt=""></a>
                <button class="user-button" onclick="togglePopUpMenue()" id="userInitialButtonID">G</button>
            </div>
    </header>

    <main-container class="main-container">

        <popupmenue class="popup-menue-position d_none" id="popUpID">
                <div class="popup-menue-container">
                    <a class="popup-menue-font" href="./legal.html">Legal Notice</a>
                    <a class="popup-menue-font" href="./privacy.html">Private Policy</a>
                    <a onclick="logout()" class="popup-menue-font" href="./index.html">Log out</a>
                </div>
        </popupmenue>


        <navbar class="navbar">

            <div class="first-navcontainer">
                <a class="navbar-element" href="./summary.html"><img class="navbar-icons" src="./img/Vector.svg"><img class="navbar-icons-responsive" src="./img/Vector.svg">Summary</a>
                <a class="navbar-element navbar-element-selected" href="./addTask.html"><img class="navbar-icons" src="./img/edit_square.svg"><img class="navbar-icons-responsive" src="./img/edit_square_blue.svg">Add Task</a>
                <a class="navbar-element" href="./board.html"><img class="navbar-icons" src="./img/Board.svg"><img class="navbar-icons-responsive" src="./img/Board.svg">Board</a>
                <a class="navbar-element" href="./contacts.html"><img class="navbar-icons" src="./img/perm_contact_calendar.svg"><img class="navbar-icons-responsive" src="./img/perm_contact_calendar.svg">Contacts</a>
            </div>

            <div class="second-navcontainer">
                <a class="navbar-element-bottom" href="./privacy.html">Privacy Policy</a>
                <a class="navbar-element-bottom" href="./legal.html">Legal Notice</a>
            </div>

        </navbar>

        <scrollcontainer style="overflow: hidden; display: flex;">

            <form onsubmit="validateAddTaskForm(event)" name="addTaskForm" id="addTaskForm" class="main-container-addTask">



                        <input name="addTaskTitle" class="input-title-addTask" type="text" placeholder="Enter a title" id="titleID">
                        <span id="titleFontID">This field is required</span>

                        <div class="margin-top-add-task">
                            <span class="font-bold-add-task">Description</span><span class="font-normal-add-task"> (optional)</span>
                        </div>
                        <textarea class="textarea-description-addtask" name="addTaskDescription" placeholder="Enter a Description"></textarea>
                        


                        <div class="margin-top-add-task">
                            <span class="font-bold-add-task">Due date</span>
                        </div>
                        <input class="input-date-addTask" type="date" name="addTaskDate" placeholder="tt/mm/jjjj" id="dateID">
                        <span id="dateFontID">This field is required</span>


                        <priority class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Priority</span>
                            <div class="prio-buttons-order-addTask margin-top-add-task" id="prioID">
                                <button onclick="setPrioToUrgent()" type="button" class="prio-buttons-addTask high-prio-button-addTask" id="urgentPrioID">Urgent<img class="prio-icons-addTask" src="./img/addTask/prio-high.svg" id="urgentPrioIMGID"></button>
                                <button onclick="setPrioToMedium()" type="button" class="prio-buttons-addTask mid-prio-button-addTask" id="mediumPrioID">Medium<img class="prio-icons-addTask" src="./img/addTask/prio-medium.svg" id="midPrioIMGID"></button>
                                <button onclick="setPrioToLow()" type="button" class="prio-buttons-addTask low-prio-button-addTask" id="lowPrioID">Low<img class="prio-icons-addTask" src="./img/addTask/prio-low.svg" id="lowPrioIMGID"></button>
                            </div>
                        </priority>





                        <assignedTo class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Assigned to</span><span class="font-normal-add-task"> (optional)</span>
                        </assignedTo>



                        <div class="custom-select-addTask margin-top-add-task" data-placeholder="Select contacts to assign">
                            <input type="hidden" name="contacts" value="">
                            
                            <button type="button" class="custom-select-toggle-addTask">
                                <span class="custom-select-label-addTask">Select contacts to assign</span>
                                <span class="custom-select-arrow-wrap-addTask">
                                    <img class="custom-select-arrow-addTask" src="./img/addTask/arrow_drop_down.svg" alt="">
                                </span>
                            </button>

                            <div class="custom-select-menu-addTask d_none" id="contactSelectionID">
                            </div>
                        </div>

                        <div class="contact-inital-ball-container-under-contact-option" id="initialBallContainerID"></div>


                        <div class="custom-select-addTask margin-top-add-task" data-placeholder="Select task category" id="categoryID">
                            <input type="hidden" name="taskCategory">
                            
                            <button type="button" class="custom-select-toggle-addTask underline-color-select-category">
                                <span class="custom-select-label-addTask">Select task category</span>
                                <span class="custom-select-arrow-wrap-addTask">
                                    <img class="custom-select-arrow-addTask" src="./img/addTask/arrow_drop_down.svg" alt="">
                                </span>
                            </button>

                            <div class="custom-select-menu-addTask d_none">
                                <button type="button" class="custom-select-option-addTask" data-value="Technical Task">Technical Task</button>
                                <button type="button" class="custom-select-option-addTask" data-value="User Story">User Story</button>
                            </div>
                        </div>

                            


                        <subtask class="margin-top-bigger-add-task">
                            <span class="font-bold-add-task">Subtask</span><span class="font-normal-add-task"> (optional)</span>
                            
                        </subtask>

                        <div class="wrapper-div-container margin-top-add-task margin-bottom-add-task">
                            <input onkeyup="showButtons()" name="subtaskform" class="input-subtask-addTask" type="text" placeholder="add new subtask" id="subtaskValueID">
                            
                            <div class="cancel-and-confirm-container d_none" id="subtasksInputfieldButtonContainerID">
                                    <img onclick="deleteInputValueSubtask()" class="cancel-icon" src="./img/addTask/cancel.svg">
                                    <span class="cancel-and-confirm-separator"></span>
                                    <img onclick="pasteSubtaskUnderInputfield()" class="confirm-icon" src="./img/addTask/confirm.svg">
                            </div>
                        </div>

                        <div class="subtasks-container" id="createdSubtasksContainerID"></div>

                        
                        
                        <buttons class="button-order-addtask-responsive">
                            <button onclick="relodePage();" type="reset" form="addTaskForm" class="button-white-addtask">
                                Clear
                                <img class="clear-icon-addtask" src="./img/addTask/iconoir_cancel.svg" alt="">
                            </button>
                            <button type="submit" form="addTaskForm" class="button-blue-addtask">
                                Create Task
                                <img class="affirmative-icon-addtask" src="./img/addTask/check.svg" alt="">
                            </button>
                        </buttons>
                        


                    </form>

        </scrollcontainer>

                        <buttons class="button-order-addtask">
                            <button onclick="relodePage();" type="reset" form="addTaskForm" class="button-white-addtask">
                                Clear
                                <img class="clear-icon-addtask" src="./img/addTask/iconoir_cancel.svg" alt="">
                            </button>
                            <button type="submit" form="addTaskForm" class="button-blue-addtask">
                                Create Task
                                <img class="affirmative-icon-addtask" src="./img/addTask/check.svg" alt="">
                            </button>
                        </buttons>

                        

        

    </main-container>
    
</body>
</html>
